# ========================================
# ESP32 Voice Test - 配置文件
# 存放路径：/sdcard/config.ini
# ========================================

# ----------------------------------------
# WiFi 配置（必填）
# ----------------------------------------
WIFI_SSID=XL206-2
WIFI_PASS=13510602814

# ========================================
# 火山引擎 TTS 配置
# ========================================

# ----------------------------------------
# 鉴权方式（二选一，推荐新版）
# ----------------------------------------

# 【方式 A】新版控制台（推荐）
# 只需填 TTS_API_KEY，从控制台 → 语音合成 → API Key 管理 获取
# UUID 格式，例如：423199ee-f156-411b-84d6-ff2469c54a34
TTS_API_KEY=423199ee-f156-411b-84d6-ff2469c54a34

# 【方式 B】旧版控制台（备选）
# 需要同时配置 APPID + TOKEN
# TTS_APPID=your_app_id
# TTS_TOKEN=your_access_token
# TTS_CLUSTER=volcano_tts
# TTS_RESOURCE_ID=seed-tts-2.0

# ----------------------------------------
# 音色配置
# ----------------------------------------

# 音色 ID（缺省值：薇薇）
# 可选项：
#   zh_female_vv_uranus_bigtts     - 薇薇（女，标准，⭐缺省值）
#   zh_male_aha_mars_bigtts        - 阿浩（男，标准）
#   zh_female_xiaolei_mars_bigtts  - 晓蕾（女，温柔）
#   zh_female_shuangkuaisisi_moon_bigtts - 双快思思（女，活泼）
TTS_VOICE=zh_female_vv_uranus_bigtts

# ----------------------------------------
# 高级配置（可选，一般无需修改）
# ----------------------------------------

# 集群名称（旧版控制台用，新版无需填写）
# TTS_CLUSTER=volcano_tts

# 资源 ID（一般无需修改）
# TTS_RESOURCE_ID=seed-tts-2.0
