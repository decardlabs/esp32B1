# Responses API 端点
# LLM_ENDPOINT=https://ark.cn-beijing.volces.com/api/v3/responses
# 推理接入点 ID（方舟控制台 → 模型推理 → 接入点）
# LLM_MODEL=ep-20260613183650-5268q

# ========================================
# api.decard.cc deepseek-v4-flash 配置
# ========================================
LLM_API_KEY=sk-XaugTmX1euOEE6hM019eA650997d75899dBeA7874aA21429
LLM_ENDPOINT=https://api.decard.cc/v1/chat/completions
