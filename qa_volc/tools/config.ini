# ========================================
# 火山引擎 ASR 配置（语音识别）
# ========================================
# 新版控制台：控制台 → 语音识别 → API Key 管理
# UUID 格式，例如：423199ee-f156-411b-84d6-ff2469c54a34
ASR_API_KEY=423199ee-f156-411b-84d6-ff2469c54a34
# ASR 资源 ID（新版控制台）
# 豆包录音文件识别模型2.0 → volc.seedasr.auc
# 豆包录音文件识别模型1.0 → volc.bigasr.auc
ASR_RESOURCE_ID=volc.seedasr.auc

# ========================================
# 火山引擎 豆包大模型 配置
